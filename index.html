<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Infrastructure Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0c;
  --bg2: #0e1114;
  --surface: #13161a;
  --surface2: #1a1e23;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #dde1e7;
  --muted: #5a6270;
  --muted2: #8892a0;
  --green: #3dffa0;
  --green-dim: rgba(61,255,160,0.08);
  --red: #ff6b6b;
  --red-dim: rgba(255,107,107,0.08);
  --amber: #ffb547;
  --blue: #5bb8ff;
  --blue-dim: rgba(91,184,255,0.1);
  --purple: #b88aff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* GRID TEXTURE */
body::before{
  content:'';
  position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:3rem 1.5rem 5rem;}

/* HEADER */
.site-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:3rem;padding-bottom:2rem;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:1.5rem;
}
.logo{
  font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;
  letter-spacing:-0.04em;color:var(--text);
}
.logo span{color:var(--green);}
.tagline{
  font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
  color:var(--muted);margin-top:5px;letter-spacing:.04em;
}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hbtn{
  font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
  padding:7px 14px;border-radius:6px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--muted2);cursor:pointer;transition:all .15s;
}
.hbtn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.hbtn-green{
  background:var(--green-dim);border-color:rgba(61,255,160,0.25);
  color:var(--green);
}
.hbtn-green:hover{background:rgba(61,255,160,0.14);color:var(--green);}

/* STATS ROW */
.stats-row{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;margin-bottom:2rem;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.stat-val{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text);}
.stat-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}

/* FILTERS */
.filter-row{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.fil{
  font-family:'IBM Plex Mono',monospace;font-size:0.65rem;
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .12s;
}
.fil.on{border-color:rgba(255,255,255,0.18);color:var(--text);background:var(--surface2);}
.search-wrap{margin-left:auto;}
.search-wrap input{
  font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:6px 12px;
  outline:none;width:180px;transition:border-color .12s;
}
.search-wrap input:focus{border-color:var(--border2);}
.search-wrap input::placeholder{color:var(--muted);}

/* TABLE HEADER */
.tbl-head{
  display:grid;
  grid-template-columns:72px 180px 1fr 80px 80px 76px 76px 80px 36px;
  gap:10px;
  padding:0 16px 8px;
  font-family:'IBM Plex Mono',monospace;font-size:0.6rem;
  color:var(--muted);text-transform:uppercase;letter-spacing:.07em;
}
.tr{text-align:right;}

/* STOCK CARD */
.stock-list{display:flex;flex-direction:column;gap:5px;}
.stock-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  transition:border-color .15s;
  animation:fadeUp .3s ease both;
}
.stock-card:hover{border-color:var(--border2);}
.stock-card.removed{opacity:.28;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.card-row{
  display:grid;
  grid-template-columns:72px 180px 1fr 80px 80px 76px 76px 80px 36px;
  gap:10px;align-items:center;
  padding:13px 16px;cursor:pointer;
}
.card-row:hover .ticker-sym{color:var(--green);}

.ticker-sym{
  font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;
  color:var(--text);transition:color .12s;
}
.co-block{display:flex;flex-direction:column;gap:2px;}
.co-name{font-size:0.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.co-ctry{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--muted);}
.cat-pill{
  font-family:'IBM Plex Mono',monospace;font-size:0.58rem;
  padding:2px 7px;border-radius:20px;white-space:nowrap;
  display:inline-block;
}
.num-cell{
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  text-align:right;color:var(--muted2);
}
.pos{color:var(--green)!important;}
.neg{color:var(--red)!important;}
.expand-icon{
  font-size:0.7rem;color:var(--muted);
  text-align:center;transition:transform .2s;
  font-family:'IBM Plex Mono',monospace;
}
.stock-card.open .expand-icon{transform:rotate(90deg);}

/* EXPANDED PANEL */
.card-detail{
  display:none;border-top:1px solid var(--border);
  padding:20px 20px 20px;
  animation:fadeIn .2s ease;
}
.stock-card.open .card-detail{display:block;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.detail-grid{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:16px;
}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr;}}

.det-section{}
.det-label{
  font-family:'IBM Plex Mono',monospace;font-size:0.58rem;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.det-label::after{content:'';flex:1;height:1px;background:var(--border);}
.det-text{font-size:0.74rem;color:var(--muted2);line-height:1.65;}
.det-text strong{color:var(--text);font-weight:500;}

.ceo-name{
  font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;
  color:var(--text);margin-bottom:4px;
}
.ceo-edu{
  font-family:'IBM Plex Mono',monospace;font-size:0.63rem;
  color:var(--green);margin-bottom:8px;line-height:1.5;
}

/* REMOVE BTN */
.rm-btn{
  width:26px;height:26px;border-radius:5px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.rm-btn:hover{background:var(--red-dim);border-color:rgba(255,107,107,0.3);color:var(--red);}
.rm-btn.restore:hover{background:var(--green-dim);border-color:rgba(61,255,160,0.3);color:var(--green);}

/* ADD PANEL */
.add-panel{
  margin-top:1rem;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:20px;display:none;
}
.add-panel.open{display:block;animation:fadeIn .2s ease;}
.add-panel h3{
  font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;
  color:var(--text);margin-bottom:14px;
}
.add-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:8px;margin-bottom:12px;
}
.add-grid input,.add-grid select,.add-grid textarea{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);
  font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
  padding:8px 10px;outline:none;transition:border-color .12s;
  resize:vertical;
}
.add-grid input:focus,.add-grid select:focus,.add-grid textarea:focus{border-color:var(--border2);}
.add-grid input::placeholder,.add-grid textarea::placeholder{color:var(--muted);}
.add-grid select option{background:#1a1e23;}
.add-grid .full{grid-column:1/-1;}
.add-actions{display:flex;gap:8px;}

/* STATUS */
.status{
  font-family:'IBM Plex Mono',monospace;font-size:0.63rem;
  color:var(--muted);text-align:center;padding:1.2rem 0 0;
  min-height:32px;
}
.ok{color:var(--green);}
.err{color:var(--red);}

/* EMPTY */
.empty{
  text-align:center;padding:3rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted);
}
</style>
</head>

<div class="page">

<header class="site-header">
  <div>
    <div class="logo">AI Infra<span>.</span>Watch</div>
    <div class="tagline">hardware & electrical bottleneck portfolio · collaborative</div>
  </div>
  <div class="header-right">
    <button class="hbtn" onclick="toggleRemoved()" id="rm-toggle-btn">show removed</button>
    <button class="hbtn" onclick="exportJSON()">export JSON</button>
    <button class="hbtn hbtn-green" onclick="toggleAdd()">+ add stock</button>
  </div>
</header>

<div class="stats-row" id="stats-row"></div>

<div class="filter-row">

  <button class="fil" data-f="US">🇺🇸 US</button>
  <button class="fil" data-f="JP">🇯🇵 Japan</button>
  <button class="fil" data-f="CN">🇨🇳 China</button>
  <button class="fil" data-f="EU">🇪🇺 Europe</button>
  <div class="search-wrap">
    <input type="text" id="search-box" placeholder="search ticker or name..." oninput="render()">
  </div>
</div>

<div class="tbl-head">
  <span>Ticker</span>
  <span>Company</span>
  <span>Category</span>
  <span class="tr">Price</span>
  <span class="tr">Mkt Cap</span>
  <span class="tr">P/E</span>
  <span class="tr">YTD</span>
  <span class="tr">Region</span>
  <span></span>
</div>

<div class="stock-list" id="stock-list"></div>

<div class="add-panel" id="add-panel">
  <h3>Add a stock to the watchlist</h3>
  <div class="add-grid">
    <input id="f-ticker" placeholder="Ticker (e.g. NVDA)">
    <input id="f-name" placeholder="Company name">
    <input id="f-country" placeholder="Country (US / JP / CN / NL)">
    <input id="f-price" placeholder="Price USD (e.g. 145.00)" type="number">
    <input id="f-mktcap" placeholder="Mkt cap (e.g. 2.1T)">
    <input id="f-pe" placeholder="P/E ratio" type="number">
    <input id="f-ytd" placeholder="YTD % (e.g. +12.4)">
    <select id="f-cat">
      <option value="">Category</option>
      <option>Power & grid</option>
      <option>Cooling</option>
      <option>Semicon capital</option>
      <option>HBM memory</option>
      <option>Optical interconnects</option>
      <option>Mature-node foundry</option>
      <option>Data-centre power</option>
      <option>High-speed interconnects</option>
      <option>Optical fiber & cable</option>
      <option>Other</option>
    </select>
    <input id="f-ceo" placeholder="CEO name">
    <input id="f-edu" placeholder="CEO education">
    <input id="f-prev" placeholder="CEO previous role(s)">
    <textarea id="f-desc" placeholder="What the company does (2–3 sentences)" rows="2" class="full"></textarea>
    <textarea id="f-vision" placeholder="CEO vision / strategic direction" rows="2" class="full"></textarea>
  </div>
  <div class="add-actions">
    <button class="hbtn hbtn-green" onclick="addStock()">Add stock</button>
    <button class="hbtn" onclick="toggleAdd()">Cancel</button>
  </div>
</div>

<div class="status" id="status"></div>

</div>

    cat:'Data-centre power', removed:false,
    desc:'CATL is the world\'s largest EV battery manufacturer, now pivoting aggressively into AI data-centre power infrastructure. It is selling large-scale battery energy storage systems and HVDC (High-Voltage Direct Current) power solutions to data centres, invested $600M in Zhongheng Electric (a specialist in DC power for data centres), and is reportedly investing in AI startup DeepSeek.',
    ceo:'Robin Zeng Yuqun', edu:'B.Eng. Shanghai Jiaotong University · M.Sc. South China University of Technology · Ph.D. Condensed Matter Physics, Chinese Academy of Sciences',
    prev:'Co-founded ATL (lithium-ion batteries for consumer electronics) in 1999 · Founded CATL in 2011 in Ningde, Fujian · Built CATL into the world\'s #1 EV battery maker over a decade',
    vision:'Use CATL\'s battery and energy storage expertise to power the next generation of AI data centres. Zeng plans to sell HVDC storage systems and power infrastructure to hyperscalers and is using AI internally to accelerate battery R&D — making AI both a customer and a tool.'
  },
  {
    ticker:'002475', name:'Luxshare-ICT', country:'CN', price:'18.40', mktcap:'$46B', pe:'19', ytd:'+7.3',
    cat:'High-speed interconnects', removed:false,
    desc:'Luxshare-ICT is a Chinese precision manufacturer that makes the high-speed electrical connectors, backplane systems, and cable assemblies that link GPUs, switches, and servers inside AI clusters. Its 224G interconnect technology is already deployed in commercial AI clusters in China and globally. The company is expanding into liquid cooling and power management for data centres.',
    ceo:'Wang Laichun (Grace Wang)', edu:'Junior high school graduate · EMBA, Tsinghua University · Entirely self-made',
    prev:'Assembly-line operator at Foxconn Shenzhen aged 21 (1988) · Left Foxconn 1997 to start own venture · Co-founded Luxshare with brother Wang Laisheng in 2004 · Built into a major Apple and AI supply-chain manufacturer',
    vision:'Expand Luxshare\'s precision manufacturing capabilities from consumer electronics into the AI data-centre supply chain at every layer — interconnects, power, and thermal management. Data-centre revenue hit RMB 24.6B in 2025 (+34% YoY) with 224G and 448G roadmap already in development.'
  },
];

let stocks = [];
let showRemoved = false;
let activeFilter = 'all';
let openCards = new Set();

function save(){
  try{ localStorage.setItem('aiwatch-v3', JSON.stringify(stocks)); }catch(e){}
  flashStatus('saved to local storage');
}

function load(){
  try{
    const d = localStorage.getItem('aiwatch-v3');
    stocks = d ? JSON.parse(d) : JSON.parse(JSON.stringify(DEFAULT_STOCKS));
  } catch(e){ stocks = JSON.parse(JSON.stringify(DEFAULT_STOCKS)); }
  render();
}

function flashStatus(msg, isErr){
  const el = document.getElementById('status');
  el.innerHTML = `<span class="${isErr?'err':'ok'}">${isErr?msg:'✓ '+msg}</span>`;
  setTimeout(()=>{ el.textContent=''; }, 2500);
}

function renderStats(){
  const active = stocks.filter(s=>!s.removed);
  const regions = [...new Set(active.map(s=>reg(s.country)))];
  const cats = [...new Set(active.map(s=>s.cat))];
  const avgYTD = active.length ? (active.reduce((a,s)=>{
    const n=parseFloat(s.ytd); return a+(isNaN(n)?0:n);
  },0)/active.filter(s=>!isNaN(parseFloat(s.ytd))).length).toFixed(1) : 0;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Active stocks</div>
      <div class="stat-val">${active.length}</div>
      <div class="stat-sub">${stocks.length - active.length} removed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Regions</div>
      <div class="stat-val">${regions.length}</div>
      <div class="stat-sub">${regions.join(' · ')}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Categories</div>
      <div class="stat-val">${cats.length}</div>
      <div class="stat-sub">bottleneck themes</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg YTD</div>
      <div class="stat-val" style="color:${avgYTD>0?'var(--green)':'var(--red)'}">${avgYTD>0?'+':''}${avgYTD}%</div>
      <div class="stat-sub">active positions</div>
    </div>
  `;
}

function render(){
  renderStats();
  const list = document.getElementById('stock-list');
  list.innerHTML = '';
  const q = (document.getElementById('search-box').value||'').toLowerCase();

  const filtered = stocks.filter(s=>{
    if(!showRemoved && s.removed) return false;
    if(activeFilter!=='all' && reg(s.country)!==activeFilter) return false;
    if(q && !s.ticker.toLowerCase().includes(q) && !s.name.toLowerCase().includes(q)) return false;
    return true;
  });

  if(!filtered.length){
    list.innerHTML = '<div class="empty">no stocks match · try a different filter or search</div>';
    return;
  }

  filtered.forEach((s, fi)=>{
    const gi = stocks.indexOf(s);
    const isOpen = openCards.has(gi);
    const cs = CAT_STYLE[s.cat]||CAT_STYLE['Other'];
    const ytdN = parseFloat(s.ytd);
    const ytdDisp = isNaN(ytdN)?s.ytd:(ytdN>0?'+':'')+ytdN.toFixed(1)+'%';
    const ytdCls = ytdN>0?'pos':ytdN<0?'neg':'';
    const flag = FLAGS[reg(s.country)]||'';
    const delay = fi*0.04;

    const card = document.createElement('div');
    card.className = 'stock-card'+(s.removed?' removed':'')+(isOpen?' open':'');
    card.style.animationDelay = delay+'s';

    card.innerHTML = `
      <div class="card-row" onclick="toggleCard(${gi})">
        <div class="ticker-sym">${s.ticker}</div>
        <div class="co-block">
          <div class="co-name">${s.name}</div>
          <div class="co-ctry">${flag} ${s.country}</div>
        </div>
        <div>
          <span class="cat-pill" style="background:${cs.bg};color:${cs.c}">${s.cat}</span>
        </div>
        <div class="num-cell">${s.price?'$'+parseFloat(s.price).toFixed(2):'—'}</div>
        <div class="num-cell">${s.mktcap||'—'}</div>
        <div class="num-cell">${s.pe?s.pe+'x':'—'}</div>
        <div class="num-cell ${ytdCls}">${ytdDisp}</div>
        <div class="num-cell">${flag} ${reg(s.country)}</div>
        <button class="rm-btn${s.removed?' restore':''}" onclick="event.stopPropagation();toggleRemove(${gi})" title="${s.removed?'Restore':'Remove'}">
          ${s.removed?'↩':'×'}
        </button>
      </div>
      <div class="card-detail">
        <div class="detail-grid">
          <div class="det-section">
            <div class="det-label">What they do</div>
            <div class="det-text">${s.desc||'No description added yet.'}</div>
          </div>
          <div class="det-section">
            <div class="det-label">CEO profile</div>
            <div class="ceo-name">${s.ceo||'—'}</div>
            <div class="ceo-edu">${s.edu||''}</div>
            <div class="det-text"><strong>Previous:</strong> ${s.prev||'—'}</div>
          </div>
          <div class="det-section">
            <div class="det-label">Vision</div>
            <div class="det-text">${s.vision||'No vision statement added yet.'}</div>
          </div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  document.getElementById('stock-list').querySelectorAll('.stock-card').forEach((card,fi)=>{
    const gi = stocks.indexOf(filtered[fi]);
    if(openCards.has(gi)) card.querySelector('.expand-icon') && null;
  });
}

function toggleCard(gi){
  if(openCards.has(gi)) openCards.delete(gi);
  else openCards.add(gi);
  render();
}

function toggleRemove(gi){
  stocks[gi].removed = !stocks[gi].removed;
  save(); render();
}

function toggleRemoved(){
  showRemoved = !showRemoved;
  document.getElementById('rm-toggle-btn').textContent = showRemoved?'hide removed':'show removed';
  render();
}

function toggleAdd(){
  document.getElementById('add-panel').classList.toggle('open');
}

function addStock(){
  const t = document.getElementById('f-ticker').value.trim().toUpperCase();
  const n = document.getElementById('f-name').value.trim();
  if(!t||!n){ flashStatus('ticker and name are required', true); return; }
  stocks.push({
    ticker:t, name:n,
    country: document.getElementById('f-country').value.trim()||'US',
    price:   document.getElementById('f-price').value||'',
    mktcap:  document.getElementById('f-mktcap').value.trim()||'—',
    pe:      document.getElementById('f-pe').value||'',
    ytd:     document.getElementById('f-ytd').value||'0',
    cat:     document.getElementById('f-cat').value||'Other',
    ceo:     document.getElementById('f-ceo').value.trim()||'',
    edu:     document.getElementById('f-edu').value.trim()||'',
    prev:    document.getElementById('f-prev').value.trim()||'',
    desc:    document.getElementById('f-desc').value.trim()||'',
    vision:  document.getElementById('f-vision').value.trim()||'',
    removed:false,
  });
  ['f-ticker','f-name','f-country','f-price','f-mktcap','f-pe','f-ytd','f-ceo','f-edu','f-prev','f-desc','f-vision']
    .forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('f-cat').value='';
  save(); render();
  document.getElementById('add-panel').classList.remove('open');
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(stocks, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-infra-watchlist.json';
  a.click();
}

document.getElementById('filter-bar')||null;
document.querySelector('.filter-row').addEventListener('click', e=>{
  const btn = e.target.closest('.fil');
  if(!btn) return;
  document.querySelectorAll('.fil').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  activeFilter = btn.dataset.f;
  render();
});

load();
</script>
</body>
</html>
